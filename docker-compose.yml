version: '3.8'

services:
  alarm-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alarm-backend
    restart: unless-stopped
    ports:
      - "5127:5127"
    environment:
      # API Configuration
      - API_HOST=0.0.0.0
      - API_PORT=5127
      
      # Security
      - API_PASSWORD=${API_PASSWORD}
      
      # Google TV Configuration
      # Set your TV's IP address here
      - TV_IP=${TV_IP}
      - TV_PORT=${TV_PORT}
      
      # Timezone (set to your local timezone)
      - TZ=${TZ:-Asia/Kolkata}
      
      # Logging
      - LOGTAIL_TOKEN=${LOGTAIL_TOKEN:-}
      
      # Database
      - DB_PATH=/app/data/alarms.db
    
    # Network mode host may be needed for ADB connectivity
    # Uncomment if you have issues connecting to TV
    # network_mode: host
    
    volumes:
      # Persist alarm data
      - alarm-data:/app/data
      
      # Mount ADB keys for persistent pairing
      - adb-keys:/root/.android
    
    # Privileged mode may be needed for ADB
    # Uncomment if you have permission issues
    # privileged: true

volumes:
  alarm-data:
    driver: local
  adb-keys:
    driver: local
